<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Chess vs krisper (1102)</title>

  <!-- chessboard.js (requires jQuery) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <!-- chess.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- Stockfish debug (optional) -->
  <script>
    fetch("/chess/stockfish10.js?v=999")
      .then(r => r.text())
      .then(t => {
        console.log("stockfish10.js length:", t.length);
        console.log("contains 'function Stockfish':", t.includes("function Stockfish"));
        console.log("contains 'var Stockfish':", t.includes("var Stockfish"));
        console.log("first 120 chars:", t.slice(0,120));
      })
      .catch(e => console.error("fetch stockfish10.js failed", e));
  </script>

  <style>
    :root{
      --bg:#302e2b;
      --panel:#272522;
      --panel2:#1f1e1b;
      --line:rgba(255,255,255,.08);

      --text:#e7e3db;
      --muted:#a39d93;

      --light:#EEEED2;
      --dark:#769656;

      --btn:#3a3733;
      --btnHover:#45413c;

      --green:#2f7d32;
      --greenHover:#3a8f3d;

      /* slightly rounded */
      --sq:6px;

      --boardBorder:1px;

      /* chat bubble */
      --bubbleBg:#f2f2f2;
      --bubbleText:#1b1b1b;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .app{
      height:100vh;
      width:min(1320px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 420px; /* wider sidebar */
      gap:16px;
      padding:18px;
      align-items:start;
    }

    .left{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .playerBar{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:56px;
      flex:0 0 auto;
    }

    .playerMeta{ display:flex; align-items:center; gap:10px; min-width:0; }

    .avatar{
      width:36px; height:36px;
      border-radius:var(--sq);
      background:var(--panel2);
      border:1px solid var(--line);
      display:grid;
      place-items:center;
      font-weight:800;
      user-select:none;
      flex:0 0 auto;
      overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;}

    .names{ line-height:1.1; min-width:0; }
    .names .name{
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .names .elo{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .flag{ font-size:14px; opacity:.95; }

    .botLink{
      display:flex;
      align-items:center;
      gap:10px;
      color:inherit;
      text-decoration:none;
      min-width:0;
    }
    .botLink:hover .name{ text-decoration:underline; }

    .capturedStrip{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:8px 10px;
      display:flex;
      gap:6px;
      align-items:center;
      min-height:40px;
      overflow:hidden;
      flex:0 0 auto;
    }
    .capturedStrip img{ width:22px; height:22px; display:block; opacity:.95; }
    .capSpacer{ flex:1 1 auto; }
    .capScore{
      font-size:12px;
      color:var(--text);
      opacity:.92;
      font-weight:800;
      padding-left:6px;
      white-space:nowrap;
    }

    .boardWrap{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      place-items:center;
      position:relative;
    }

    .boardBox{
      width:min(100%, calc(100vh - 56px - 40px - 40px - 36px - 20px));
      max-width:760px;
      aspect-ratio:1 / 1;
      position:relative;
      border-radius:var(--sq);
      overflow:hidden;
      border:var(--boardBorder) solid rgba(255,255,255,.10);
      background:transparent;
    }

    #board{ width:100%; height:100%; border-radius:var(--sq); }

    .white-1e1d7{ background:var(--light) !important; }
    .black-3c85d{ background:var(--dark) !important; }

    /* Legal move dots */
    #board .square-55d63{ position:relative; }
    .lmDot{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:12px;
      height:12px;
      border-radius:999px;
      background:rgba(0,0,0,.25);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
      pointer-events:none;
    }

    /* End overlay */
    .endOverlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      background:rgba(0,0,0,.35);
      padding:18px;
    }
    .endOverlay.open{ display:flex; }

    .endCard{
      width:min(420px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .endHead{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:var(--panel);
    }
    .endTitle{ font-weight:900; }
    .endBody{ padding:12px; color:var(--muted); line-height:1.4; font-size:13px; }
    .endActions{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:nowrap;          /* keep side-by-side */
    }
    .endActions .btn{
      flex:1 1 0;
      min-width:0;
      white-space:nowrap;
    }

    .iconBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:var(--sq);
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
    }

    /* Board-centered modals */
    .boardModalOverlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:60;
    }
    .boardModalOverlay.open{ display:flex; }

    .boardModal{
      width:min(420px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .boardModalHead{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
    }
    .boardModalTitle{ font-weight:900; letter-spacing:.01em; }
    .boardModalBody{ padding:14px 12px; color:var(--muted); line-height:1.4; }
    .boardModalActions{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .boardModalActions .btn{ flex:1 1 0; min-width:160px; }

    /* Sidebar */
    .side{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      min-width:0;
    }

    .sideTop{
      padding:12px;
      border-bottom:1px solid var(--line);
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:0 0 auto;
    }

    .sideHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .sideHeader .title{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:flex;
      align-items:center;
      gap:8px;
    }

    /* Chat row with avatar at left (a little bigger) */
    .chatRow{
      display:grid;
      grid-template-columns: 110px 1fr;
      gap:12px;
      align-items:start;
      min-height:230px;
    }
    .chatAvatar{
      width:110px;
      height:110px;
      border-radius:var(--sq);
      border:none;                 /* no border */
      background:transparent;
      overflow:hidden;
      display:grid;
      place-items:center;
      font-weight:900;
      user-select:none;
    }
    .chatAvatar img{ width:100%; height:100%; object-fit:cover; display:block; }

    /* chat area: NOT scrollable; only last message shows; slightly lower alignment */
    .chat{
      background:transparent;
      border:none;
      border-radius:0;
      padding:18px 0 0;            /* pushes bubble down to better align with face */
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:10px;
      height:230px;
      overflow:hidden;
    }

    /* ONLY bot bubbles; white with dark text; 10s hold then quick fade */
    .bubble{
      max-width:92%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.08);
      background:var(--bubbleBg);
      color:var(--bubbleText);
      font-size:13px;
      line-height:1.25;
      white-space:pre-wrap;
      align-self:flex-start;

      opacity:0;
      animation: bubbleLife 10.35s ease forwards; /* 10s visible + quick fade */
      will-change: opacity, transform;
    }
    @keyframes bubbleLife{
      0%   { opacity:0; transform:translateY(2px); }
      3%   { opacity:1; transform:translateY(0); }
      96%  { opacity:1; transform:translateY(0); }
      100% { opacity:0; transform:translateY(-1px); }
    }

    /* Moves header: more breathing room under "Moves" */
    .movesTitle{
      padding:10px 12px 8px; /* was ... 0 */
      color:var(--muted);
      font-size:12px;
      letter-spacing:.02em;
      flex:0 0 auto;
    }

    .moves{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:10px 12px;
      background:var(--panel);
    }
    .moves::-webkit-scrollbar{ width:10px; }
    .moves::-webkit-scrollbar-track{ background:transparent; }
    .moves::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.12);
      border:3px solid transparent;
      background-clip:padding-box;
      border-radius:999px;
    }
    .moves:hover::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.18); }
    .moves{ scrollbar-width:thin; scrollbar-color: rgba(255,255,255,.14) transparent; }

    .moveRow{
      display:grid;
      grid-template-columns: 34px 1fr 1fr;
      gap:10px;
      padding:8px 6px;
      border-radius:var(--sq);
      align-items:center;
    }
    .moveRow:hover{ background:rgba(255,255,255,.04); }
    .moveNo{ color:var(--muted); font-size:12px; text-align:right; padding-right:4px;}
    .moveSan{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .moveSan.last{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:var(--sq);
      padding:4px 6px;
    }

    .sideBottom{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      background:var(--panel);
      flex:0 0 auto;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--text);
      padding:10px 12px;
      border-radius:var(--sq);
      cursor:pointer;
      font-weight:900;
      flex:1 1 auto;
      min-width:110px;
      white-space:nowrap;
    }
    .btn:hover{ background:var(--btnHover); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; filter:saturate(.65); }
    .btn.danger{ background:#3b2626; border-color:rgba(255,255,255,.10); }
    .btn.danger:hover{ background:#4a2d2d; }
    .btn.green{ background:var(--green); border-color:rgba(255,255,255,.10); }
    .btn.green:hover{ background:var(--greenHover); }

    /* ---- MOBILE ---- */
    .mobileMenuBtn, .mobileSheetBackdrop { display:none; }

    @media (max-width: 980px){
      .app{
        width:100%;
        height:100dvh;
        grid-template-columns: 1fr;
        gap:10px;
        padding:12px;
      }
      .side{ display:none; }
      .left{ height:calc(100dvh - 24px); }
      .boardBox{ width:100%; max-width:none; }
      #capturedBottom{
        margin-bottom: calc(14px + 60px + 14px + max(env(safe-area-inset-bottom), 0px));
      }

      .mobileMenuBtn{
        display:block;
        position:fixed;
        right:14px;
        bottom: calc(14px + max(env(safe-area-inset-bottom), 0px));
        width:60px; height:60px;
        border-radius:16px;
        border:1px solid var(--line);
        background:rgba(0,0,0,.20);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color:var(--text);
        z-index:9998;
        cursor:pointer;
      }
      .mobileMenuBtn .bars{
        width:24px; height:16px;
        margin:0 auto;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
      }
      .mobileMenuBtn .bars span{
        display:block;
        height:2px;
        background:rgba(255,255,255,.75);
        border-radius:999px;
      }

      .mobileSheetBackdrop{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.55);
        z-index:9999;
        align-items:flex-end;
        justify-content:center;
      }
      .mobileSheetBackdrop.open{ display:flex; }

      .mobileSheet{
        width:100%;
        max-width:520px;
        background:var(--panel);
        border:1px solid var(--line);
        border-radius:18px 18px 0 0;
        overflow:hidden;
      }
      .sheetGrab{
        height:32px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-bottom:1px solid var(--line);
        background:var(--panel);
      }
      .sheetGrab .pill{
        width:66px;
        height:6px;
        border-radius:999px;
        background:rgba(255,255,255,.18);
      }
      .sheetBtns{
        padding:14px;
        display:grid;
        grid-template-columns: 1fr;
        gap:12px;
      }
      .sheetBtns .btn{
        width:100%;
        min-width:0;
        padding:16px 14px;
        font-size:16px;
        border-radius:12px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="left">
      <div class="playerBar">
        <a class="botLink" href="https://www.chess.com/member/krisper" target="_blank" rel="noopener noreferrer" aria-label="krisper on chess.com">
          <div class="playerMeta">
            <div class="avatar" aria-hidden="true" id="topBotAvatar">K</div>
            <div class="names">
              <div class="name" id="botName">krisper</div>
              <div class="elo">
                <span id="botElo">1102</span>
                <span class="flag" aria-label="flag" title="Canada">🇨🇦</span>
              </div>
            </div>
          </div>
        </a>
      </div>

      <div class="capturedStrip" id="capturedTop"></div>

      <div class="boardWrap">
        <div class="boardBox" id="boardBox">
          <div id="board"></div>

          <div class="endOverlay" id="endOverlay" aria-hidden="true">
            <div class="endCard" role="dialog" aria-modal="true" aria-label="Game over">
              <div class="endHead">
                <div class="endTitle" id="endTitle">Game Over</div>
                <button class="iconBtn" type="button" id="endCloseBtn">✕</button>
              </div>
              <div class="endBody" id="endBody">PGN is ready.</div>
              <div class="endActions">
                <button class="btn green" type="button" id="rematchBtn">Rematch</button>
                <button class="btn" type="button" id="copyPgnBtn">Copy PGN</button>
              </div>
            </div>
          </div>

          <div class="boardModalOverlay" id="sideOverlay" aria-hidden="true">
            <div class="boardModal" role="dialog" aria-modal="true" aria-label="New game">
              <div class="boardModalHead">
                <div class="boardModalTitle">New Game</div>
                <button class="iconBtn" type="button" id="sideCloseBtn">✕</button>
              </div>
              <div class="boardModalBody">Choose a side to play.</div>
              <div class="boardModalActions">
                <button class="btn" type="button" id="playWhiteBtn">Play as White</button>
                <button class="btn" type="button" id="playBlackBtn">Play as Black</button>
              </div>
            </div>
          </div>

          <div class="boardModalOverlay" id="resignOverlay" aria-hidden="true">
            <div class="boardModal" role="dialog" aria-modal="true" aria-label="Resign">
              <div class="boardModalHead">
                <div class="boardModalTitle">Resign?</div>
                <button class="iconBtn" type="button" id="resignCloseBtn">✕</button>
              </div>
              <div class="boardModalBody">Are you sure you want to resign?</div>
              <div class="boardModalActions">
                <button class="btn" type="button" id="resignNoBtn">No</button>
                <button class="btn danger" type="button" id="resignYesBtn">Yes</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="capturedStrip" id="capturedBottom"></div>
    </section>

    <aside class="side">
      <div class="sideTop">
        <div class="sideHeader">
          <a class="botLink" href="https://www.chess.com/member/krisper" target="_blank" rel="noopener noreferrer">
            <div class="title">krisper <span class="flag" title="Canada">🇨🇦</span></div>
          </a>
        </div>

        <div class="chatRow">
          <div class="chatAvatar" id="sideChatAvatar" aria-hidden="true">K</div>
          <div class="chat" id="chat"></div>
        </div>
      </div>

      <div class="movesTitle">Moves</div>
      <div class="moves" id="moves"></div>

      <div class="sideBottom">
        <button class="btn" id="newGameBtn">New Game</button>
        <button class="btn" id="flipBtn">Flip Board</button>
        <button class="btn danger" id="resignBtn">Resign</button>
      </div>
    </aside>
  </div>

  <button class="mobileMenuBtn" id="mobileMenuBtn" aria-label="Menu">
    <div class="bars" aria-hidden="true"><span></span><span></span><span></span></div>
  </button>

  <div class="mobileSheetBackdrop" id="mobileSheet">
    <div class="mobileSheet" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="sheetGrab" id="sheetClose"><div class="pill"></div></div>
      <div class="sheetBtns">
        <button class="btn" id="mNewGameBtn">New Game</button>
        <button class="btn" id="mFlipBtn">Flip Board</button>
        <button class="btn danger" id="mResignBtn">Resign</button>
      </div>
    </div>
  </div>

<script>
  function hardFail(msg){ console.error(msg); throw new Error(msg); }
  if (typeof Chess === "undefined") hardFail("chess.js failed to load.");
  if (typeof ChessBoard === "undefined") hardFail("chessboard.js failed to load.");

  // ---- Chat timing (10s visible + quick fade) ----
  const CHAT_VISIBLE_MS = 10000;
  const CHAT_TOTAL_MS   = 10350; // matches CSS bubbleLife duration (10.35s)

  // Avatars
  const TOP_AVATAR_URL  = "./krisper-avatar.png"; // top bar
  const CHAT_AVATAR_URL = "./krisper.png";        // sidebar chat

  function setImgAvatar(el, url, fallbackLetter){
    if (!el) return;
    el.innerHTML = url
      ? `<img src="${url}" alt="Avatar">`
      : (fallbackLetter || "K");
  }
  setImgAvatar(document.getElementById("topBotAvatar"), TOP_AVATAR_URL, "K");
  setImgAvatar(document.getElementById("sideChatAvatar"), CHAT_AVATAR_URL, "K");

  // DOM
  const newGameBtn = document.getElementById("newGameBtn");
  const flipBtn = document.getElementById("flipBtn");
  const resignBtn = document.getElementById("resignBtn");

  const mNewGameBtn = document.getElementById("mNewGameBtn");
  const mFlipBtn = document.getElementById("mFlipBtn");
  const mResignBtn = document.getElementById("mResignBtn");

  const movesEl = document.getElementById("moves");
  const capturedTopEl = document.getElementById("capturedTop");
  const capturedBottomEl = document.getElementById("capturedBottom");

  // Board modals
  const sideOverlay = document.getElementById("sideOverlay");
  const resignOverlay = document.getElementById("resignOverlay");
  const sideCloseBtn = document.getElementById("sideCloseBtn");
  const resignCloseBtn = document.getElementById("resignCloseBtn");
  const playWhiteBtn = document.getElementById("playWhiteBtn");
  const playBlackBtn = document.getElementById("playBlackBtn");
  const resignYesBtn = document.getElementById("resignYesBtn");
  const resignNoBtn = document.getElementById("resignNoBtn");

  function openBoardOverlay(el){ el.classList.add("open"); el.setAttribute("aria-hidden","false"); }
  function closeBoardOverlay(el){ el.classList.remove("open"); el.setAttribute("aria-hidden","true"); }
  sideCloseBtn.addEventListener("click", () => closeBoardOverlay(sideOverlay));
  resignCloseBtn.addEventListener("click", () => closeBoardOverlay(resignOverlay));
  sideOverlay.addEventListener("click", (e) => { if (e.target === sideOverlay) closeBoardOverlay(sideOverlay); });
  resignOverlay.addEventListener("click", (e) => { if (e.target === resignOverlay) closeBoardOverlay(resignOverlay); });

  // End overlay
  const endOverlay = document.getElementById("endOverlay");
  const endTitle = document.getElementById("endTitle");
  const endBody = document.getElementById("endBody");
  const endCloseBtn = document.getElementById("endCloseBtn");
  const rematchBtn = document.getElementById("rematchBtn");
  const copyPgnBtn = document.getElementById("copyPgnBtn");

  function openEndOverlay(titleText){
    endTitle.textContent = titleText;
    endBody.textContent = "PGN is ready.";
    endOverlay.classList.add("open");
    endOverlay.setAttribute("aria-hidden","false");
    copyPgnBtn.disabled = false;
    copyPgnBtn.textContent = "Copy PGN";
  }
  function closeEndOverlay(){
    endOverlay.classList.remove("open");
    endOverlay.setAttribute("aria-hidden","true");
  }
  endCloseBtn.addEventListener("click", closeEndOverlay);
  endOverlay.addEventListener("click", (e) => { if (e.target === endOverlay) closeEndOverlay(); });

  // Chat (BOT ONLY) — only last message, fades after 10s
  const chatEl = document.getElementById("chat");
  let chatTimer = null;

  function clearChat(){
    chatEl.innerHTML = "";
    if (chatTimer) { clearTimeout(chatTimer); chatTimer = null; }
  }

  function botSay(text){
    chatEl.innerHTML = "";

    const div = document.createElement("div");
    div.className = "bubble";
    div.textContent = text;
    chatEl.appendChild(div);

    if (chatTimer) clearTimeout(chatTimer);
    chatTimer = setTimeout(() => {
      if (div && div.parentNode === chatEl) div.remove();
    }, CHAT_TOTAL_MS);
  }

  // Periodic chatter every ~3–5 full moves (≈6–10 plies), only if no check/end
  const randomLines = [
    "When did you start playing chess?",
    "My dog is here.",
    "You've activated my trap card.",
    "@@@",
    "I'm going to have to study this one later."
  ];
  function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  let plySinceChatter = 0;
  let nextChatterAtPlies = randInt(6, 10);

  function resetChatter(){
    plySinceChatter = 0;
    nextChatterAtPlies = randInt(6, 10);
  }

  function maybeRandomChatter(){
    if (!gameStarted) return;
    if (game.game_over()) return;
    if (game.in_check()) return;
    plySinceChatter++;

    if (plySinceChatter >= nextChatterAtPlies){
      botSay(pick(randomLines));
      resetChatter();
    }
  }

  // Copy PGN
  const game = new Chess();

  async function copyPgnToClipboard(){
    const pgn = game.pgn();
    try{
      await navigator.clipboard.writeText(pgn);
      endBody.textContent = "Copied!";
      copyPgnBtn.disabled = true;
      copyPgnBtn.textContent = "Copied";
    }catch(err){
      try{
        const ta = document.createElement("textarea");
        ta.value = pgn;
        ta.style.position="fixed";
        ta.style.left="-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();

        endBody.textContent = "Copied!";
        copyPgnBtn.disabled = true;
        copyPgnBtn.textContent = "Copied";
      }catch(e){
        endBody.textContent = "Copy failed. (Clipboard permissions)";
      }
    }
  }
  copyPgnBtn.addEventListener("click", copyPgnToClipboard);

  // Mobile sheet
  const mobileMenuBtn = document.getElementById("mobileMenuBtn");
  const mobileSheet = document.getElementById("mobileSheet");
  const sheetClose = document.getElementById("sheetClose");
  function openSheet(){ mobileSheet.classList.add("open"); }
  function closeSheet(){ mobileSheet.classList.remove("open"); }
  mobileMenuBtn.addEventListener("click", () => openSheet());
  sheetClose.addEventListener("click", () => closeSheet());
  mobileSheet.addEventListener("click", (e) => { if (e.target === mobileSheet) closeSheet(); });

  // Game state
  let board;
  let playerColor = "w";
  let engineColor = "b";
  let gameStarted = false;

  // Stockfish
  const sf = new Worker("./stockfish10.js");
  let engineReady = false;
  let engineThinking = false;

  function setGameUiState(){
    if (!gameStarted) {
      newGameBtn.classList.add("green");
      newGameBtn.disabled = false;
      mNewGameBtn.disabled = false;
    } else {
      newGameBtn.classList.remove("green");
      newGameBtn.disabled = true;
      mNewGameBtn.disabled = true;
    }
    resignBtn.disabled = !gameStarted;
    mResignBtn.disabled = !gameStarted;
  }

  function speakChecksAndEnds(){
    if (game.in_checkmate()){
      const mated = game.turn();
      if (mated === engineColor) {
        botSay("You got me.");
        openEndOverlay("You won!");
      } else {
        botSay("Get rekt.");
        openEndOverlay("You lost.");
      }
      return true;
    }
    if (game.in_stalemate()){
      botSay("Good game.");
      return true;
    }
    if (game.in_check()){
      const inCheck = game.turn();
      if (inCheck === engineColor) botSay("Check.");
      else botSay("Check, m8.");
      return true;
    }
    return false;
  }

  sf.onerror = (e) => {
    console.error("Stockfish worker error:", e);
    botSay("Engine error.");
  };

  sf.onmessage = (event) => {
    const line = event.data;

    if (line === "uciok") {
      sf.postMessage("setoption name UCI_LimitStrength value true");
      sf.postMessage("setoption name UCI_Elo value 1102");
      sf.postMessage("isready");
      return;
    }

    if (line === "readyok") {
      engineReady = true;
      return;
    }

    if (typeof line === "string" && line.startsWith("bestmove ")) {
      const uci = line.split(" ")[1];

      if (engineThinking) {
        engineThinking = false;

        if (uci && uci !== "(none)") {
          const from = uci.slice(0,2);
          const to   = uci.slice(2,4);
          const promo = uci.length >= 5 ? uci[4] : "q";

          const mv = game.move({ from, to, promotion: promo });
          if (mv) {
            board.position(game.fen(), true);
            renderMoves();
            renderCaptured();

            // no move bubbles; only check/end + periodic chatter
            const spoke = speakChecksAndEnds();
            if (!spoke && !game.game_over()) maybeRandomChatter();
          }
        }
      }
    }
  };

  sf.postMessage("uci");

  function requestEngineMove(){
    if (!engineReady || engineThinking) return;
    if (game.game_over()) return;
    if (game.turn() !== engineColor) return;

    engineThinking = true;
    sf.postMessage("position fen " + game.fen());
    sf.postMessage("go depth 14");
  }

  const PIECE_THEME = "./img/chesspieces/wikipedia/{piece}.png";
  const pieceImgSrc = (pieceCode) => PIECE_THEME.replace("{piece}", pieceCode);

  function clearMoveDots(){
    document.querySelectorAll("#board .lmDot").forEach(el => el.remove());
  }
  function showLegalMoveDots(square){
    clearMoveDots();
    const moves = game.moves({ square, verbose: true });
    for (const m of moves){
      const sqEl = document.querySelector(`#board .square-${m.to}`);
      if (!sqEl) continue;
      const dot = document.createElement("div");
      dot.className = "lmDot";
      sqEl.appendChild(dot);
    }
  }

  function renderMoves(){
    if (!movesEl) return;
    const history = game.history();
    const rows = [];
    for (let i = 0; i < history.length; i += 2){
      rows.push({ no: (i/2)+1, w: history[i]||"", b: history[i+1]||"" });
    }
    movesEl.innerHTML = "";
    rows.forEach((r, idx) => {
      const row = document.createElement("div");
      row.className = "moveRow";

      const no = document.createElement("div");
      no.className = "moveNo";
      no.textContent = r.no + ".";

      const w = document.createElement("div");
      w.className = "moveSan";
      w.textContent = r.w;

      const b = document.createElement("div");
      b.className = "moveSan";
      b.textContent = r.b;

      const isLastRow = idx === rows.length - 1;
      if (isLastRow) {
        if (history.length % 2 === 1) { if (r.w) w.classList.add("last"); }
        else { if (r.b) b.classList.add("last"); }
      }

      row.appendChild(no); row.appendChild(w); row.appendChild(b);
      movesEl.appendChild(row);
    });
    movesEl.scrollTop = movesEl.scrollHeight;
  }

  const pieceValue = { p:1, n:3, b:3, r:5, q:9 };

  function renderCaptured(){
    const verbose = game.history({ verbose:true });
    const capturedByWhite = [];
    const capturedByBlack = [];
    let pointsWhite = 0;
    let pointsBlack = 0;

    for (const mv of verbose){
      if (!mv.captured) continue;
      const v = pieceValue[mv.captured] || 0;
      if (mv.color === "w"){
        capturedByWhite.push(mv.captured);
        pointsWhite += v;
      } else {
        capturedByBlack.push(mv.captured);
        pointsBlack += v;
      }
    }

    const order = { q:0, r:1, b:2, n:3, p:4 };
    capturedByWhite.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));
    capturedByBlack.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));

    const diff = pointsWhite - pointsBlack; // + => White up

    function paintStrip(el, arr, prefixColor, scoreText){
      el.innerHTML = "";
      if (!arr.length && !scoreText) return;

      for (const p of arr){
        const code = prefixColor + p.toUpperCase();
        const img = document.createElement("img");
        img.alt = code;
        img.src = pieceImgSrc(code);
        el.appendChild(img);
      }

      if (scoreText){
        const spacer = document.createElement("span");
        spacer.className = "capSpacer";
        el.appendChild(spacer);

        const score = document.createElement("span");
        score.className = "capScore";
        score.textContent = scoreText;
        el.appendChild(score);
      }
    }

    const topScore = diff < 0 ? `+${Math.abs(diff)}` : "";
    const bottomScore = diff > 0 ? `+${diff}` : "";

    paintStrip(capturedTopEl, capturedByBlack, "w", topScore);
    paintStrip(capturedBottomEl, capturedByWhite, "b", bottomScore);
  }

  function showIdleIntro(){
    clearChat();
    resetChatter();

    // "Hey..." stays until it fully fades, THEN show "Press New Game..."
    botSay("Hey, I'm Krisper.");
    setTimeout(() => botSay("Press New Game to begin."), CHAT_TOTAL_MS + 50);
  }

  function resetToMain(){
    game.reset();
    board.start(true);
    clearMoveDots();
    engineThinking = false;
    gameStarted = false;

    closeEndOverlay();
    closeBoardOverlay(sideOverlay);
    closeBoardOverlay(resignOverlay);

    renderMoves();
    renderCaptured();

    showIdleIntro();
    setGameUiState();
  }

  function startNewGame(asColor){
    playerColor = asColor;
    engineColor = (asColor === "w") ? "b" : "w";

    game.reset();
    board.start(true);
    clearMoveDots();
    engineThinking = false;
    gameStarted = true;

    closeEndOverlay();
    closeBoardOverlay(sideOverlay);
    closeBoardOverlay(resignOverlay);

    board.orientation(playerColor === "w" ? "white" : "black");
    renderMoves();
    renderCaptured();

    clearChat();
    resetChatter();
    botSay("Let's play.");

    setGameUiState();

    if (engineReady && game.turn() === engineColor) requestEngineMove();
  }

  // Init board
  board = ChessBoard("board", {
    draggable: true,
    position: "start",
    pieceTheme: PIECE_THEME,

    onDragStart: (source, piece) => {
      if (!gameStarted) return false;
      if (game.game_over() || engineThinking) return false;

      const isWhitePiece = piece.startsWith("w");
      const isBlackPiece = piece.startsWith("b");

      if (playerColor === "w" && isBlackPiece) return false;
      if (playerColor === "b" && isWhitePiece) return false;
      if (game.turn() !== playerColor) return false;

      showLegalMoveDots(source);
      return true;
    },

    onDrop: (source, target) => {
      clearMoveDots();
      if (!gameStarted) return "snapback";

      const mv = game.move({ from: source, to: target, promotion: "q" });
      if (mv === null) return "snapback";

      board.position(game.fen(), true);

      renderMoves();
      renderCaptured();

      const spoke = speakChecksAndEnds();
      if (!spoke && !game.game_over()) maybeRandomChatter();

      setTimeout(requestEngineMove, 60);
      return;
    },

    onSnapEnd: () => board.position(game.fen())
  });

  // New game / resign buttons
  function openNewGame(){
    if (gameStarted) return;
    openBoardOverlay(sideOverlay);
  }
  function openResign(){
    if (!gameStarted) return;
    openBoardOverlay(resignOverlay);
  }

  newGameBtn.addEventListener("click", openNewGame);
  flipBtn.addEventListener("click", () => board.flip());
  resignBtn.addEventListener("click", openResign);

  mNewGameBtn.addEventListener("click", () => { closeSheet(); openNewGame(); });
  mFlipBtn.addEventListener("click", () => { closeSheet(); board.flip(); });
  mResignBtn.addEventListener("click", () => { closeSheet(); openResign(); });

  playWhiteBtn.addEventListener("click", () => startNewGame("w"));
  playBlackBtn.addEventListener("click", () => startNewGame("b"));

  resignNoBtn.addEventListener("click", () => closeBoardOverlay(resignOverlay));
  resignYesBtn.addEventListener("click", () => {
    closeBoardOverlay(resignOverlay);
    botSay("You resigned.");
    resetToMain();
  });

  rematchBtn.addEventListener("click", () => {
    closeEndOverlay();
    startNewGame(playerColor);
  });

  // initial
  renderMoves();
  renderCaptured();
  showIdleIntro();
  setGameUiState();

  window.addEventListener("resize", () => board.resize());
  setTimeout(() => board.resize(), 250);
</script>
</body>
</html>
