<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Chess vs krisper (1102)</title>

  <!-- chessboard.js (requires jQuery) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <!-- chess.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- Stockfish (single-thread build; works on GitHub Pages) -->
  <script>
    fetch("/chess/stockfish10.js?v=999")
      .then(r => r.text())
      .then(t => {
        console.log("stockfish10.js length:", t.length);
        console.log("contains 'function Stockfish':", t.includes("function Stockfish"));
        console.log("contains 'var Stockfish':", t.includes("var Stockfish"));
        console.log("first 120 chars:", t.slice(0,120));
      })
      .catch(e => console.error("fetch stockfish10.js failed", e));
  </script>
  <script>
    console.log("Loaded stockfish10.js, Stockfish =", typeof Stockfish);
  </script>

  <style>
    :root{
      --bg:#302e2b;
      --panel:#272522;
      --panel2:#1f1e1b;
      --line:rgba(255,255,255,.08);
      --text:#e7e3db;
      --muted:#a39d93;

      --light:#EEEED2;
      --dark:#769656;

      --btn:#3a3733;
      --btnHover:#45413c;

      --sq:6px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    /* ---- DESKTOP (one viewport) ---- */
    .app{
      height:100vh;
      width:min(1240px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:16px;
      padding:18px;
      align-items:start;
    }

    .left{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .playerBar{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:56px;
      flex:0 0 auto;
    }

    .playerMeta{ display:flex; align-items:center; gap:10px; min-width:0; }

    .avatar{
      width:36px; height:36px;
      border-radius:var(--sq);
      background:var(--panel2);
      border:1px solid var(--line);
      display:grid;
      place-items:center;
      font-weight:800;
      user-select:none;
      flex:0 0 auto;
      overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;}

    .names{ line-height:1.1; min-width:0; }
    .names .name{
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .names .elo{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .flag{ font-size:14px; opacity:.95; }

    .capturedStrip{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:8px 10px;
      display:flex;
      gap:6px;
      align-items:center;
      min-height:40px;
      overflow:hidden;
      flex:0 0 auto;
    }
    .capturedStrip img{ width:22px; height:22px; display:block; opacity:.95; }
    .capturedStrip .empty{ color:var(--muted); font-size:12px; }

    .boardWrap{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    #board{
      width:min(100%, calc(100vh - 56px - 40px - 40px - 36px - 20px));
      max-width:760px;
      aspect-ratio:1 / 1;
      border-radius:var(--sq);
      overflow:hidden;
      border:1px solid var(--line);
    }

    /* chessboard.js square color override */
    .white-1e1d7{ background:var(--light) !important; }
    .black-3c85d{ background:var(--dark) !important; }

    /* Legal-move dots */
    #board .square-55d63{ position:relative; }
    .lmDot{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:12px;
      height:12px;
      border-radius:999px;
      background:rgba(0,0,0,.25);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
      pointer-events:none;
    }

    /* End-of-game modal centered over board */
    .endOverlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      background:rgba(0,0,0,.35);
      padding:18px;
    }
    .endOverlay.open{ display:flex; }

    .endCard{
      width:min(420px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .endHead{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:var(--panel);
    }
    .endTitle{ font-weight:900; }
    .endBody{ padding:12px; color:var(--muted); line-height:1.4; font-size:13px; }
    .endActions{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .endActions .btn{ flex:1 1 auto; min-width:140px; }

    /* ---- RIGHT SIDEBAR ---- */
    .side{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      min-width:0;
    }

    .sideTop{
      padding:12px;
      border-bottom:1px solid var(--line);
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:0 0 auto;
    }

    .chatHead{ display:flex; align-items:center; gap:10px; }
    .chatHead .botInfo{ line-height:1.1; min-width:0; }
    .chatHead .botInfo .name{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .chatHead .botInfo .sub{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .chat{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:190px;
      overflow:auto;
    }

    /* Modern transparent scrollbar */
    .chat::-webkit-scrollbar{ width:10px; }
    .chat::-webkit-scrollbar-track{ background:transparent; }
    .chat::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.14);
      border:3px solid transparent;
      background-clip:padding-box;
      border-radius:999px;
    }
    .chat:hover::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.20); }
    .chat{ scrollbar-width:thin; scrollbar-color: rgba(255,255,255,.16) transparent; }

    .bubble{
      max-width:88%;
      padding:8px 10px;
      border-radius:var(--sq);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:13px;
      line-height:1.25;
      white-space:pre-wrap;
    }
    .bubble.bot{ align-self:flex-start; background:rgba(255,255,255,.05); }
    .bubble.you{ align-self:flex-end; background:rgba(255,255,255,.08); }

    .movesTitle{
      padding:10px 12px 0;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.02em;
      flex:0 0 auto;
    }

    .moves{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:10px 12px;
      background:var(--panel);
    }

    .moves::-webkit-scrollbar{ width:10px; }
    .moves::-webkit-scrollbar-track{ background:transparent; }
    .moves::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.12);
      border:3px solid transparent;
      background-clip:padding-box;
      border-radius:999px;
    }
    .moves:hover::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.18); }
    .moves{ scrollbar-width:thin; scrollbar-color: rgba(255,255,255,.14) transparent; }

    .moveRow{
      display:grid;
      grid-template-columns: 34px 1fr 1fr;
      gap:10px;
      padding:8px 6px;
      border-radius:var(--sq);
      align-items:center;
    }
    .moveRow:hover{ background:rgba(255,255,255,.04); }
    .moveNo{ color:var(--muted); font-size:12px; text-align:right; padding-right:4px;}
    .moveSan{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .moveSan.last{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:var(--sq);
      padding:4px 6px;
    }

    .sideBottom{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      background:var(--panel);
      flex:0 0 auto;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--text);
      padding:10px 12px;
      border-radius:var(--sq);
      cursor:pointer;
      font-weight:900;
      flex:1 1 auto;
      min-width:110px;
    }
    .btn:hover{ background:var(--btnHover); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }
    .btn.danger{ background:#3b2626; border-color:rgba(255,255,255,.10); }
    .btn.danger:hover{ background:#4a2d2d; }

    /* MODALS */
    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modalBackdrop.open{ display:flex; }
    .modal{
      width:min(420px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
    }
    .modalHead{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
    }
    .modalTitle{ font-weight:900; letter-spacing:.01em; }
    .iconBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:var(--sq);
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
    }
    .modalBody{ padding:14px 12px; color:var(--muted); line-height:1.4; }
    .modalActions{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .modalActions .btn{ flex:0 0 auto; min-width:120px; }

    /* ---- MOBILE ---- */
    .mobileMenuBtn, .mobileSheetBackdrop { display:none; }

    @media (max-width: 980px){
      .app{
        width:100%;
        height:100dvh;
        grid-template-columns: 1fr;
        gap:10px;
        padding:12px;
      }
      .side{ display:none; }
      .left{ height:calc(100dvh - 24px); }
      #board{ width:100%; max-width:none; aspect-ratio:1/1; }

      /* keep bottom bar clear of the button + safe area */
      #capturedBottom{
        margin-bottom: calc(14px + 52px + 14px + max(env(safe-area-inset-bottom), 0px));
      }

      .mobileMenuBtn{
        display:block;
        position:fixed;
        right:14px;
        bottom: calc(14px + max(env(safe-area-inset-bottom), 0px));
        width:52px;
        height:52px;
        border-radius:14px;
        border:1px solid var(--line);
        background:rgba(0,0,0,.20);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color:var(--text);
        z-index:9998;
        cursor:pointer;
      }
      .mobileMenuBtn .bars{
        width:22px; height:14px;
        margin:0 auto;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
      }
      .mobileMenuBtn .bars span{
        display:block;
        height:2px;
        background:rgba(255,255,255,.75);
        border-radius:999px;
      }

      .mobileSheetBackdrop{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.55);
        z-index:9999;
        align-items:flex-end;
        justify-content:center;
      }
      .mobileSheetBackdrop.open{ display:flex; }

      .mobileSheet{
        width:100%;
        max-width:520px;
        background:var(--panel);
        border:1px solid var(--line);
        border-radius:14px 14px 0 0;
        overflow:hidden;
      }
      .sheetGrab{
        height:28px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-bottom:1px solid var(--line);
        background:var(--panel);
      }
      .sheetGrab .pill{
        width:56px;
        height:5px;
        border-radius:999px;
        background:rgba(255,255,255,.18);
      }
      .sheetBtns{
        padding:12px;
        display:grid;
        grid-template-columns: 1fr;
        gap:10px;
      }
      .sheetBtns .btn{ width:100%; min-width:0; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- LEFT -->
    <section class="left">
      <div class="playerBar">
        <div class="playerMeta">
          <div class="avatar" aria-hidden="true" id="topBotAvatar">K</div>
          <div class="names">
            <div class="name" id="botName">krisper</div>
            <div class="elo">
              <span id="botElo">1102</span>
              <span class="flag" aria-label="flag" title="Canada">🇨🇦</span>
            </div>
          </div>
        </div>
      </div>

      <div class="capturedStrip" id="capturedTop"><span class="empty">Captured: —</span></div>

      <div class="boardWrap">
        <div id="board"></div>

        <!-- Win/Lose overlay centered over board -->
        <div class="endOverlay" id="endOverlay" aria-hidden="true">
          <div class="endCard" role="dialog" aria-modal="true" aria-label="Game over">
            <div class="endHead">
              <div class="endTitle" id="endTitle">Game Over</div>
              <button class="iconBtn" type="button" id="endCloseBtn">✕</button>
            </div>
            <div class="endBody" id="endBody">PGN copied to clipboard.</div>
            <div class="endActions">
              <button class="btn" type="button" id="rematchBtn">Rematch</button>
              <button class="btn" type="button" id="copyPgnBtn">Copy PGN</button>
            </div>
          </div>
        </div>
      </div>

      <div class="capturedStrip" id="capturedBottom"><span class="empty">Lost: —</span></div>
    </section>

    <!-- RIGHT (desktop only) -->
    <aside class="side">
      <div class="sideTop">
        <div class="chatHead">
          <div class="avatar" id="sideBotAvatar" aria-hidden="true">K</div>
          <div class="botInfo">
            <div class="name">krisper <span class="flag" title="Canada">🇨🇦</span></div>
            <div class="sub">Elo <span id="sideBotElo">1102</span></div>
          </div>
        </div>

        <div class="chat" id="chat">
          <div class="bubble bot">Ready when you are.</div>
        </div>
      </div>

      <div class="movesTitle">Moves</div>
      <div class="moves" id="moves"></div>

      <!-- Reverted button layout: New Game, Flip Board, Resign -->
      <div class="sideBottom">
        <button class="btn" id="newGameBtn">New Game</button>
        <button class="btn" id="flipBtn">Flip Board</button>
        <button class="btn danger" id="resignBtn">Resign</button>
      </div>
    </aside>
  </div>

  <!-- MOBILE menu button -->
  <button class="mobileMenuBtn" id="mobileMenuBtn" aria-label="Menu">
    <div class="bars" aria-hidden="true"><span></span><span></span><span></span></div>
  </button>

  <!-- MOBILE bottom sheet -->
  <div class="mobileSheetBackdrop" id="mobileSheet">
    <div class="mobileSheet" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="sheetGrab" id="sheetClose"><div class="pill"></div></div>
      <div class="sheetBtns">
        <button class="btn" id="mNewGameBtn">New Game</button>
        <button class="btn" id="mFlipBtn">Flip Board</button>
        <button class="btn danger" id="mResignBtn">Resign</button>
      </div>
    </div>
  </div>

  <!-- SIDE SELECT MODAL -->
  <div class="modalBackdrop" id="sideModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="New game">
      <div class="modalHead">
        <div class="modalTitle">New Game</div>
        <button class="iconBtn" type="button" data-close-side>✕</button>
      </div>
      <div class="modalBody">Choose a side to play.</div>
      <div class="modalActions">
        <button class="btn" type="button" id="playWhiteBtn">Play as White</button>
        <button class="btn" type="button" id="playBlackBtn">Play as Black</button>
      </div>
    </div>
  </div>

  <!-- RESIGN MODAL -->
  <div class="modalBackdrop" id="resignModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Resign">
      <div class="modalHead">
        <div class="modalTitle">Resign?</div>
        <button class="iconBtn" type="button" data-close-resign>✕</button>
      </div>
      <div class="modalBody">Are you sure you want to resign?</div>
      <div class="modalActions">
        <button class="btn" type="button" id="resignNoBtn">No</button>
        <button class="btn danger" type="button" id="resignYesBtn">Yes</button>
      </div>
    </div>
  </div>

<script>
  function hardFail(msg){ console.error(msg); throw new Error(msg); }
  if (typeof Chess === "undefined") hardFail("chess.js failed to load.");
  if (typeof ChessBoard === "undefined") hardFail("chessboard.js failed to load.");

  /* =========================
     CONFIG: BOT AVATAR IMAGE
     Put a square-ish image in your repo, e.g:
       /chess/img/bot.png
     Then set:
       const BOT_AVATAR_URL = "./img/bot.png";
     Leave "" to use the letter avatar.
  ========================= */
  const BOT_AVATAR_URL = ""; // example: "./img/bot.png"

  function applyBotAvatar(){
    const ids = ["topBotAvatar","sideBotAvatar"];
    for (const id of ids){
      const el = document.getElementById(id);
      if (!el) continue;
      if (!BOT_AVATAR_URL) {
        el.innerHTML = "K";
      } else {
        el.innerHTML = `<img src="${BOT_AVATAR_URL}" alt="Bot avatar">`;
      }
    }
  }
  applyBotAvatar();

  // DOM
  const newGameBtn = document.getElementById("newGameBtn");
  const flipBtn = document.getElementById("flipBtn");
  const resignBtn = document.getElementById("resignBtn");

  const mNewGameBtn = document.getElementById("mNewGameBtn");
  const mFlipBtn = document.getElementById("mFlipBtn");
  const mResignBtn = document.getElementById("mResignBtn");

  const movesEl = document.getElementById("moves");
  const capturedTopEl = document.getElementById("capturedTop");
  const capturedBottomEl = document.getElementById("capturedBottom");

  // End overlay
  const endOverlay = document.getElementById("endOverlay");
  const endTitle = document.getElementById("endTitle");
  const endBody = document.getElementById("endBody");
  const endCloseBtn = document.getElementById("endCloseBtn");
  const rematchBtn = document.getElementById("rematchBtn");
  const copyPgnBtn = document.getElementById("copyPgnBtn");

  function openEndOverlay(titleText){
    endTitle.textContent = titleText;
    endBody.textContent = "PGN copied to clipboard.";
    endOverlay.classList.add("open");
    endOverlay.setAttribute("aria-hidden","false");
    copyPgnToClipboard(true);
  }
  function closeEndOverlay(){
    endOverlay.classList.remove("open");
    endOverlay.setAttribute("aria-hidden","true");
  }
  endCloseBtn.addEventListener("click", closeEndOverlay);
  endOverlay.addEventListener("click", (e) => { if (e.target === endOverlay) closeEndOverlay(); });

  async function copyPgnToClipboard(silent=false){
    const pgn = game.pgn();
    try{
      await navigator.clipboard.writeText(pgn);
      if (!silent) endBody.textContent = "Copied!";
    }catch(err){
      try{
        const ta = document.createElement("textarea");
        ta.value = pgn;
        ta.style.position="fixed";
        ta.style.left="-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        if (!silent) endBody.textContent = "Copied!";
      }catch(e){
        if (!silent) endBody.textContent = "Copy failed. (Clipboard permissions)";
      }
    }
  }
  copyPgnBtn.addEventListener("click", () => copyPgnToClipboard(false));

  // Chat
  const chatEl = document.getElementById("chat");
  function addBubble(text, who="bot"){
    const div = document.createElement("div");
    div.className = "bubble " + (who === "you" ? "you" : "bot");
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // Modals
  const sideModal = document.getElementById("sideModal");
  const resignModal = document.getElementById("resignModal");
  const playWhiteBtn = document.getElementById("playWhiteBtn");
  const playBlackBtn = document.getElementById("playBlackBtn");
  const resignYesBtn = document.getElementById("resignYesBtn");
  const resignNoBtn = document.getElementById("resignNoBtn");

  function openModal(el){ el.classList.add("open"); el.setAttribute("aria-hidden","false"); }
  function closeModal(el){ el.classList.remove("open"); el.setAttribute("aria-hidden","true"); }

  // Mobile sheet
  const mobileMenuBtn = document.getElementById("mobileMenuBtn");
  const mobileSheet = document.getElementById("mobileSheet");
  const sheetClose = document.getElementById("sheetClose");
  function openSheet(){ mobileSheet.classList.add("open"); }
  function closeSheet(){ mobileSheet.classList.remove("open"); }
  mobileMenuBtn.addEventListener("click", () => openSheet());
  sheetClose.addEventListener("click", () => closeSheet());
  mobileSheet.addEventListener("click", (e) => { if (e.target === mobileSheet) closeSheet(); });

  // Game
  const game = new Chess();
  let board;

  // Side selection
  let playerColor = "w";
  let engineColor = "b";
  let gameStarted = false;

  // ---- Stockfish Worker ----
  const sf = new Worker("./stockfish10.js");
  let engineReady = false;
  let engineThinking = false;

  function speakChecksAndEnds(){
    if (game.in_checkmate()){
      const mated = game.turn(); // side to move is checkmated
      if (mated === engineColor) {
        addBubble("Checkmate.", "you");
        openEndOverlay("You won!");
      } else {
        addBubble("Get rekt.", "bot");
        openEndOverlay("You lost.");
      }
      return true;
    }

    if (game.in_stalemate()){
      addBubble("Good game.", "bot");
      return true;
    }

    if (game.in_check()){
      const inCheck = game.turn(); // side to move is in check
      if (inCheck === engineColor) addBubble("Check.", "you");
      else addBubble("Check, m8.", "bot");
      return true;
    }

    return false;
  }

  sf.onerror = (e) => {
    console.error("Stockfish worker error:", e);
    addBubble("Engine error.", "bot");
  };

  sf.onmessage = (event) => {
    const line = event.data;

    if (line === "uciok") {
      sf.postMessage("setoption name UCI_LimitStrength value true");
      sf.postMessage("setoption name UCI_Elo value 1102");
      sf.postMessage("isready");
      return;
    }

    if (line === "readyok") {
      engineReady = true;
      addBubble("Let's play.", "bot");
      return;
    }

    if (typeof line === "string" && line.startsWith("bestmove ")) {
      const uci = line.split(" ")[1];

      if (engineThinking) {
        engineThinking = false;
        newGameBtn.disabled = false;

        if (uci && uci !== "(none)") {
          const from = uci.slice(0,2);
          const to   = uci.slice(2,4);
          const promo = uci.length >= 5 ? uci[4] : "q";

          const mv = game.move({ from, to, promotion: promo });
          if (mv) {
            board.position(game.fen(), true);
            renderMoves();
            renderCaptured();

            // Bot move shown in chat (requested)
            addBubble("Played " + mv.san, "bot");

            const spoke = speakChecksAndEnds();
            if (!spoke && !game.game_over()) addBubble("Your move.", "bot");
          }
        }
      }
    }
  };

  sf.postMessage("uci");

  function requestEngineMove(){
    if (!engineReady || engineThinking) return;
    if (game.game_over()) return;
    if (game.turn() !== engineColor) return;

    engineThinking = true;
    newGameBtn.disabled = true;

    sf.postMessage("position fen " + game.fen());
    sf.postMessage("go depth 14");
  }

  const PIECE_THEME = "./img/chesspieces/wikipedia/{piece}.png";
  const pieceImgSrc = (pieceCode) => PIECE_THEME.replace("{piece}", pieceCode);

  // Legal move dots
  function clearMoveDots(){
    document.querySelectorAll("#board .lmDot").forEach(el => el.remove());
  }
  function showLegalMoveDots(square){
    clearMoveDots();
    const moves = game.moves({ square, verbose: true });
    for (const m of moves){
      const sqEl = document.querySelector(`#board .square-${m.to}`);
      if (!sqEl) continue;
      const dot = document.createElement("div");
      dot.className = "lmDot";
      sqEl.appendChild(dot);
    }
  }

  function renderMoves(){
    if (!movesEl) return;
    const history = game.history();
    const rows = [];
    for (let i = 0; i < history.length; i += 2){
      rows.push({ no: (i/2)+1, w: history[i]||"", b: history[i+1]||"" });
    }
    movesEl.innerHTML = "";
    rows.forEach((r, idx) => {
      const row = document.createElement("div");
      row.className = "moveRow";

      const no = document.createElement("div");
      no.className = "moveNo";
      no.textContent = r.no + ".";

      const w = document.createElement("div");
      w.className = "moveSan";
      w.textContent = r.w;

      const b = document.createElement("div");
      b.className = "moveSan";
      b.textContent = r.b;

      const isLastRow = idx === rows.length - 1;
      if (isLastRow) {
        if (history.length % 2 === 1) { if (r.w) w.classList.add("last"); }
        else { if (r.b) b.classList.add("last"); }
      }

      row.appendChild(no); row.appendChild(w); row.appendChild(b);
      movesEl.appendChild(row);
    });
    movesEl.scrollTop = movesEl.scrollHeight;
  }

  // Captured pieces: SWAPPED per your rule
  function renderCaptured(){
    const verbose = game.history({ verbose:true });
    const capturedByWhite = [];
    const capturedByBlack = [];

    for (const mv of verbose){
      if (!mv.captured) continue;
      if (mv.color === "w") capturedByWhite.push(mv.captured);
      else capturedByBlack.push(mv.captured);
    }

    const order = { q:0, r:1, b:2, n:3, p:4 };
    capturedByWhite.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));
    capturedByBlack.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));

    const paint = (el, arr, prefixColor, emptyText) => {
      el.innerHTML = "";
      if (!arr.length) {
        const s = document.createElement("span");
        s.className = "empty";
        s.textContent = emptyText;
        el.appendChild(s);
        return;
      }
      for (const p of arr){
        const code = prefixColor + p.toUpperCase();
        const img = document.createElement("img");
        img.alt = code;
        img.src = pieceImgSrc(code);
        el.appendChild(img);
      }
    };

    paint(capturedTopEl, capturedByBlack, "w", "Captured: —");
    paint(capturedBottomEl, capturedByWhite, "b", "Lost: —");
  }

  function resetToMain(){
    game.reset();
    board.start(true);
    clearMoveDots();

    engineThinking = false;
    if (newGameBtn) newGameBtn.disabled = false;
    gameStarted = false;

    closeEndOverlay();
    renderMoves();
    renderCaptured();
    addBubble("New game ready.", "bot");
  }

  function startNewGame(asColor){
    playerColor = asColor;
    engineColor = (asColor === "w") ? "b" : "w";

    resetToMain();
    gameStarted = true;

    board.orientation(playerColor === "w" ? "white" : "black");
    addBubble("You are playing " + (playerColor === "w" ? "White." : "Black."), "bot");

    if (engineReady && game.turn() === engineColor) requestEngineMove();
  }

  // Board init
  board = ChessBoard("board", {
    draggable: true,
    position: "start",
    pieceTheme: PIECE_THEME,

    onDragStart: (source, piece) => {
      if (!gameStarted) return false;
      if (game.game_over() || engineThinking) return false;

      const isWhitePiece = piece.startsWith("w");
      const isBlackPiece = piece.startsWith("b");

      if (playerColor === "w" && isBlackPiece) return false;
      if (playerColor === "b" && isWhitePiece) return false;
      if (game.turn() !== playerColor) return false;

      showLegalMoveDots(source);
      return true;
    },

    onDrop: (source, target) => {
      clearMoveDots();
      if (!gameStarted) return "snapback";

      const mv = game.move({ from: source, to: target, promotion: "q" });
      if (mv === null) return "snapback";

      board.position(game.fen(), true);

      renderMoves();
      renderCaptured();

      addBubble("Played " + mv.san, "you");

      speakChecksAndEnds();
      setTimeout(requestEngineMove, 60);
      return;
    },

    onSnapEnd: () => board.position(game.fen())
  });

  // Buttons
  function openNewGame(){ openModal(sideModal); }
  function openResign(){ if (!gameStarted) return; openModal(resignModal); }

  newGameBtn.addEventListener("click", openNewGame);
  flipBtn.addEventListener("click", () => board.flip());
  resignBtn.addEventListener("click", openResign);

  // Mobile sheet buttons
  mNewGameBtn.addEventListener("click", () => { closeSheet(); openNewGame(); });
  mFlipBtn.addEventListener("click", () => { closeSheet(); board.flip(); });
  mResignBtn.addEventListener("click", () => { closeSheet(); openResign(); });

  // Side modal actions
  playWhiteBtn.addEventListener("click", () => { closeModal(sideModal); startNewGame("w"); });
  playBlackBtn.addEventListener("click", () => { closeModal(sideModal); startNewGame("b"); });

  document.querySelectorAll("[data-close-side]").forEach(btn => btn.addEventListener("click", () => closeModal(sideModal)));
  document.querySelectorAll("[data-close-resign]").forEach(btn => btn.addEventListener("click", () => closeModal(resignModal)));

  // Resign modal actions
  resignNoBtn.addEventListener("click", () => closeModal(resignModal));
  resignYesBtn.addEventListener("click", () => {
    closeModal(resignModal);
    addBubble("You resigned.", "you");
    resetToMain();
  });

  // Click outside modal to close
  sideModal.addEventListener("click", (e) => { if (e.target === sideModal) closeModal(sideModal); });
  resignModal.addEventListener("click", (e) => { if (e.target === resignModal) closeModal(resignModal); });

  // Rematch from end overlay (same colors as current game)
  rematchBtn.addEventListener("click", () => {
    closeEndOverlay();
    startNewGame(playerColor);
  });

  // Initial render
  renderMoves();
  renderCaptured();
  addBubble("Press New Game to begin.", "bot");

  // Keep board sized correctly
  window.addEventListener("resize", () => board.resize());
  setTimeout(() => board.resize(), 250);
</script>
</body>
</html>
