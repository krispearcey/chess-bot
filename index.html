<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chess vs krisper (1102)</title>

  <!-- chessboard.js (requires jQuery) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

  <!-- chess.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

  <!-- Stockfish (single-thread build; works on GitHub Pages) -->
  <script>
    fetch("/chess/stockfish10.js?v=999")
      .then(r => r.text())
      .then(t => {
        console.log("stockfish10.js length:", t.length);
        console.log("contains 'function Stockfish':", t.includes("function Stockfish"));
        console.log("contains 'var Stockfish':", t.includes("var Stockfish"));
        console.log("first 120 chars:", t.slice(0,120));
      })
      .catch(e => console.error("fetch stockfish10.js failed", e));
  </script>
  <script>
    console.log("Loaded stockfish10.js, Stockfish =", typeof Stockfish);
  </script>

  <style>
    :root{
      --bg:#302e2b;
      --panel:#272522;
      --panel2:#1f1e1b;
      --line:rgba(255,255,255,.08);
      --text:#e7e3db;
      --muted:#a39d93;

      --light:#EEEED2;
      --dark:#769656;

      --btn:#3a3733;
      --btnHover:#45413c;

      --sq:6px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      height:100vh;
      overflow:hidden;
    }

    /* ---- DESKTOP LAYOUT (one full viewport) ---- */
    .app{
      height:100vh;
      width:min(1240px, 100%);
      margin:0 auto;
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:16px;
      padding:18px;
      align-items:start;
    }

    .left{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }

    .playerBar{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:56px;
      flex:0 0 auto;
    }

    .playerMeta{ display:flex; align-items:center; gap:10px; min-width:0; }

    .avatar{
      width:36px; height:36px;
      border-radius:var(--sq);
      background:var(--panel2);
      border:1px solid var(--line);
      display:grid;
      place-items:center;
      font-weight:800;
      user-select:none;
      flex:0 0 auto;
      overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;}

    .names{ line-height:1.1; min-width:0; }
    .names .name{
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .names .elo{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .flag{ font-size:14px; opacity:.95; }

    .capturedStrip{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:8px 10px;
      display:flex;
      gap:6px;
      align-items:center;
      min-height:40px;
      overflow:hidden;
      flex:0 0 auto;
    }
    .capturedStrip img{ width:22px; height:22px; display:block; opacity:.95; }
    .capturedStrip .empty{ color:var(--muted); font-size:12px; }

    .boardWrap{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #board{
      width:min(100%, calc(100vh - 56px - 40px - 40px - 36px - 20px));
      max-width:760px;
      aspect-ratio:1 / 1;
      border-radius:var(--sq);
      overflow:hidden;
      border:1px solid var(--line);
    }

    /* chessboard.js square color override */
    .white-1e1d7{ background:var(--light) !important; }
    .black-3c85d{ background:var(--dark) !important; }

    /* Legal-move dots */
    #board .square-55d63{ position:relative; }
    .lmDot{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:12px;
      height:12px;
      border-radius:999px;
      background:rgba(0,0,0,.25);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.18);
      pointer-events:none;
    }

    /* ---- RIGHT SIDEBAR aligned to left ---- */
    .side{
      height:calc(100vh - 36px);
      display:flex;
      flex-direction:column;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
      min-width:0;
    }

    .sideTop{
      padding:12px;
      border-bottom:1px solid var(--line);
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:0 0 auto;
    }

    .chatHead{ display:flex; align-items:center; gap:10px; }
    .chatHead .botInfo{ line-height:1.1; min-width:0; }
    .chatHead .botInfo .name{
      font-weight:900;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .chatHead .botInfo .sub{
      margin-top:3px;
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .chat{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:var(--sq);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:180px;
      overflow:auto;
    }

    /* Modern transparent scrollbar */
    .chat::-webkit-scrollbar{ width:10px; }
    .chat::-webkit-scrollbar-track{ background:transparent; }
    .chat::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.14);
      border:3px solid transparent;
      background-clip:padding-box;
      border-radius:999px;
    }
    .chat:hover::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.20); }
    .chat{ scrollbar-width:thin; scrollbar-color: rgba(255,255,255,.16) transparent; }

    .bubble{
      max-width:85%;
      padding:8px 10px;
      border-radius:var(--sq);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:13px;
      line-height:1.25;
    }
    .bubble.bot{ align-self:flex-start; background:rgba(255,255,255,.05); }
    .bubble.you{ align-self:flex-end; background:rgba(255,255,255,.08); }

    .movesTitle{
      padding:10px 12px 0;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.02em;
      flex:0 0 auto;
    }

    .moves{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:10px 12px;
      background:var(--panel);
    }

    .moves::-webkit-scrollbar{ width:10px; }
    .moves::-webkit-scrollbar-track{ background:transparent; }
    .moves::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.12);
      border:3px solid transparent;
      background-clip:padding-box;
      border-radius:999px;
    }
    .moves:hover::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.18); }
    .moves{ scrollbar-width:thin; scrollbar-color: rgba(255,255,255,.14) transparent; }

    .moveRow{
      display:grid;
      grid-template-columns: 34px 1fr 1fr;
      gap:10px;
      padding:8px 6px;
      border-radius:var(--sq);
      align-items:center;
    }
    .moveRow:hover{ background:rgba(255,255,255,.04); }
    .moveNo{ color:var(--muted); font-size:12px; text-align:right; padding-right:4px;}
    .moveSan{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .moveSan.last{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:var(--sq);
      padding:4px 6px;
    }

    .sideBottom{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      background:var(--panel);
      flex:0 0 auto;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--text);
      padding:10px 12px;
      border-radius:var(--sq);
      cursor:pointer;
      font-weight:900;
      flex:1 1 auto;
      min-width:110px;
    }
    .btn:hover{ background:var(--btnHover); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }
    .btn.danger{ background:#3b2626; border-color:rgba(255,255,255,.10); }
    .btn.danger:hover{ background:#4a2d2d; }

    /* MODALS */
    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }
    .modalBackdrop.open{ display:flex; }
    .modal{
      width:min(420px, 100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--sq);
      overflow:hidden;
    }
    .modalHead{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:var(--panel);
    }
    .modalTitle{ font-weight:900; letter-spacing:.01em; }
    .iconBtn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel2);
      color:var(--text);
      border-radius:var(--sq);
      padding:8px 10px;
      cursor:pointer;
      font-weight:900;
    }
    .modalBody{ padding:14px 12px; color:var(--muted); line-height:1.4; }
    .modalActions{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .modalActions .btn{ flex:0 0 auto; min-width:120px; }

    /* ---- MOBILE: no sidebar, menu button bottom-right, avoid covering bottom bar ---- */
    .mobileMenuBtn, .mobileSheetBackdrop { display:none; }

    @media (max-width: 980px){
      .app{
        width:100%;
        height:100vh;
        grid-template-columns: 1fr;
        gap:10px;
        padding:12px;
      }
      .side{ display:none; }

      .left{ height:calc(100vh - 24px); }

      #board{
        width:100%;
        max-width:none;
        aspect-ratio:1/1;
      }

      /* push bottom captured bar up so it's not obstructed */
      #capturedBottom{ margin-bottom:76px; }

      /* Mobile menu button */
      .mobileMenuBtn{
        display:block;
        position:fixed;
        right:14px;
        bottom:14px;
        width:52px;
        height:52px;
        border-radius:14px;
        border:1px solid var(--line);
        background:rgba(0,0,0,.20);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        color:var(--text);
        z-index:9998;
        cursor:pointer;
      }
      .mobileMenuBtn .bars{
        width:22px; height:14px;
        margin:0 auto;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
      }
      .mobileMenuBtn .bars span{
        display:block;
        height:2px;
        background:rgba(255,255,255,.75);
        border-radius:999px;
      }

      /* Mobile bottom sheet */
      .mobileSheetBackdrop{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.55);
        z-index:9999;
        align-items:flex-end;
        justify-content:center;
      }
      .mobileSheetBackdrop.open{ display:flex; }

      .mobileSheet{
        width:100%;
        max-width:520px;
        background:var(--panel);
        border:1px solid var(--line);
        border-radius:14px 14px 0 0;
        overflow:hidden;
      }
      .sheetGrab{
        height:28px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-bottom:1px solid var(--line);
        background:var(--panel);
      }
      .sheetGrab .pill{
        width:56px;
        height:5px;
        border-radius:999px;
        background:rgba(255,255,255,.18);
      }
      .sheetBtns{
        padding:12px;
        display:grid;
        grid-template-columns: 1fr;
        gap:10px;
      }
      .sheetBtns .btn{ width:100%; min-width:0; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- LEFT -->
    <section class="left">
      <div class="playerBar">
        <div class="playerMeta">
          <div class="avatar" aria-hidden="true" id="topBotAvatar">K</div>
          <div class="names">
            <div class="name" id="botName">krisper</div>
            <div class="elo">
              <span id="botElo">1102</span>
              <span class="flag" aria-label="flag" title="Canada">🇨🇦</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Captured pieces TOP (swapped logic kept) -->
      <div class="capturedStrip" id="capturedTop"><span class="empty">Captured: —</span></div>

      <div class="boardWrap">
        <div id="board"></div>
      </div>

      <!-- Captured pieces BOTTOM (swapped logic kept) -->
      <div class="capturedStrip" id="capturedBottom"><span class="empty">Lost: —</span></div>
    </section>

    <!-- RIGHT (desktop only) -->
    <aside class="side">
      <div class="sideTop">
        <div class="chatHead">
          <div class="avatar" id="sideBotAvatar" aria-hidden="true">K</div>
          <div class="botInfo">
            <div class="name">krisper <span class="flag" title="Canada">🇨🇦</span></div>
            <div class="sub">Elo <span id="sideBotElo">1102</span></div>
          </div>
        </div>

        <div class="chat" id="chat">
          <div class="bubble bot">Ready when you are.</div>
        </div>
      </div>

      <div class="movesTitle">Moves</div>
      <div class="moves" id="moves"></div>

      <div class="sideBottom">
        <button class="btn" id="newGameBtn">New Game</button>
        <button class="btn" id="flipBtn">Flip Board</button>
        <button class="btn danger" id="resignBtn">Resign</button>
      </div>
    </aside>
  </div>

  <!-- MOBILE hamburger button -->
  <button class="mobileMenuBtn" id="mobileMenuBtn" aria-label="Menu">
    <div class="bars" aria-hidden="true"><span></span><span></span><span></span></div>
  </button>

  <!-- MOBILE bottom sheet -->
  <div class="mobileSheetBackdrop" id="mobileSheet">
    <div class="mobileSheet" role="dialog" aria-modal="true" aria-label="Game menu">
      <div class="sheetGrab" id="sheetClose"><div class="pill"></div></div>
      <div class="sheetBtns">
        <button class="btn" id="mNewGameBtn">New Game</button>
        <button class="btn" id="mFlipBtn">Flip Board</button>
        <button class="btn danger" id="mResignBtn">Resign</button>
      </div>
    </div>
  </div>

  <!-- SIDE SELECT MODAL -->
  <div class="modalBackdrop" id="sideModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="New game">
      <div class="modalHead">
        <div class="modalTitle">New Game</div>
        <button class="iconBtn" type="button" data-close-side>✕</button>
      </div>
      <div class="modalBody">Choose a side to play.</div>
      <div class="modalActions">
        <button class="btn" type="button" id="playWhiteBtn">Play as White</button>
        <button class="btn" type="button" id="playBlackBtn">Play as Black</button>
      </div>
    </div>
  </div>

  <!-- RESIGN MODAL -->
  <div class="modalBackdrop" id="resignModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Resign">
      <div class="modalHead">
        <div class="modalTitle">Resign?</div>
        <button class="iconBtn" type="button" data-close-resign>✕</button>
      </div>
      <div class="modalBody">Are you sure you want to resign?</div>
      <div class="modalActions">
        <button class="btn" type="button" id="resignNoBtn">No</button>
        <button class="btn danger" type="button" id="resignYesBtn">Yes</button>
      </div>
    </div>
  </div>

<script>
  function hardFail(msg){ console.error(msg); throw new Error(msg); }
  if (typeof Chess === "undefined") hardFail("chess.js failed to load.");
  if (typeof ChessBoard === "undefined") hardFail("chessboard.js failed to load.");

  // DOM
  const newGameBtn = document.getElementById("newGameBtn");
  const flipBtn = document.getElementById("flipBtn");
  const resignBtn = document.getElementById("resignBtn");

  const mNewGameBtn = document.getElementById("mNewGameBtn");
  const mFlipBtn = document.getElementById("mFlipBtn");
  const mResignBtn = document.getElementById("mResignBtn");

  const movesEl = document.getElementById("moves");
  const capturedTopEl = document.getElementById("capturedTop");
  const capturedBottomEl = document.getElementById("capturedBottom");

  // Chat
  const chatEl = document.getElementById("chat");
  function addBubble(text, who="bot"){
    const div = document.createElement("div");
    div.className = "bubble " + (who === "you" ? "you" : "bot");
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // Random helper
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  // Modals
  const sideModal = document.getElementById("sideModal");
  const resignModal = document.getElementById("resignModal");
  const playWhiteBtn = document.getElementById("playWhiteBtn");
  const playBlackBtn = document.getElementById("playBlackBtn");
  const resignYesBtn = document.getElementById("resignYesBtn");
  const resignNoBtn = document.getElementById("resignNoBtn");

  function openModal(el){ el.classList.add("open"); el.setAttribute("aria-hidden","false"); }
  function closeModal(el){ el.classList.remove("open"); el.setAttribute("aria-hidden","true"); }

  // Mobile sheet
  const mobileMenuBtn = document.getElementById("mobileMenuBtn");
  const mobileSheet = document.getElementById("mobileSheet");
  const sheetClose = document.getElementById("sheetClose");

  function openSheet(){ mobileSheet.classList.add("open"); }
  function closeSheet(){ mobileSheet.classList.remove("open"); }

  mobileMenuBtn.addEventListener("click", () => openSheet());
  sheetClose.addEventListener("click", () => closeSheet());
  mobileSheet.addEventListener("click", (e) => { if (e.target === mobileSheet) closeSheet(); });

  // Game
  const game = new Chess();
  let board;

  // Side selection
  let playerColor = "w";
  let engineColor = "b";
  let gameStarted = false;

  // ---- Stockfish Worker ----
  const sf = new Worker("./stockfish10.js");
  let engineReady = false;
  let engineThinking = false;

  // Eval tracking (centipawns from BOT perspective, higher = better for bot)
  let lastBotEvalCp = null;
  let awaitingEvalTag = null; // "pre" | "post" | etc. (light guard)

  // Parse score lines
  function parseScoreFromInfo(line){
    // Examples:
    // "info depth 12 ... score cp 34 ..."
    // "info depth 18 ... score mate -3 ..."
    const mCp = line.match(/\bscore\s+cp\s+(-?\d+)\b/);
    if (mCp) return { type:"cp", value: parseInt(mCp[1], 10) };

    const mMate = line.match(/\bscore\s+mate\s+(-?\d+)\b/);
    if (mMate) return { type:"mate", value: parseInt(mMate[1], 10) };

    return null;
  }

  // Stockfish score is from side-to-move. Convert to BOT perspective.
  function toBotPerspectiveCp(cp, sideToMove){
    // if sideToMove is botColor, score already from bot side; otherwise invert
    return (sideToMove === engineColor) ? cp : -cp;
  }

  // Speak based on delta in centipawns (bot gained/lost)
  function speakDelta(deltaCp){
    // deltaCp = newBotEvalCp - lastBotEvalCp
    if (deltaCp <= -150) addBubble(pick(["Uh oh.", "@@@"]), "bot");
    else if (deltaCp < -50) addBubble(pick(["Ah, I missed that.", "That's plum wild."]), "bot");
    else if (deltaCp < -20) addBubble(pick(["Oops.", "..."]), "bot");
    else if (deltaCp > 150) addBubble(pick(["Good luck, champ.", "You may as well resign now."]), "bot");
    else if (deltaCp > 50) addBubble(pick(["This is starting to look good.", "Ha!"]), "bot");
    else if (deltaCp > 20) addBubble(pick(["You're gonna want to study that one later.", "Oof."]), "bot");
    // else no message
  }

  function speakGameState(afterMoveByColor){
    // afterMoveByColor: "w" or "b" who just moved
    if (game.in_checkmate()){
      // side to move is checkmated
      const mated = game.turn(); // player to move but cannot
      if (mated === engineColor) addBubble("You're alright.", "bot");
      else addBubble("Get rekt.", "bot");
      return;
    }
    if (game.in_stalemate()){
      addBubble("Good game.", "bot");
      return;
    }
    if (game.in_check()){
      // side to move is in check
      const inCheck = game.turn();
      if (inCheck === engineColor) addBubble("Check.", "bot");
      else addBubble("Check, mate.", "bot");
    }
  }

  function requestEval(tag){
    if (!engineReady) return;
    // If engine is currently thinking a move, don't interrupt.
    if (engineThinking) return;

    awaitingEvalTag = tag;

    sf.postMessage("position fen " + game.fen());
    // quick eval; adjust if you want more stable numbers
    sf.postMessage("go movetime 180");
  }

  sf.onerror = (e) => {
    console.error("Stockfish worker error:", e);
    addBubble("Engine error.", "bot");
  };

  sf.onmessage = (event) => {
    const line = event.data;

    if (line === "uciok") {
      sf.postMessage("setoption name UCI_LimitStrength value true");
      sf.postMessage("setoption name UCI_Elo value 1102");
      sf.postMessage("isready");
      return;
    }

    if (line === "readyok") {
      engineReady = true;
      addBubble("Let's play.", "bot");
      // establish a baseline eval for the starting position once a game begins
      return;
    }

    // Capture evaluation lines (for our eval-only search)
    if (typeof line === "string" && line.startsWith("info ")) {
      const s = parseScoreFromInfo(line);
      if (!s) return;

      // mate scores: treat as huge cp for delta purposes (direction matters)
      let cp;
      if (s.type === "cp") cp = s.value;
      else {
        // mate value from side-to-move perspective
        // mate +N means side-to-move mates in N => big advantage
        // mate -N means side-to-move gets mated => big disadvantage
        cp = (s.value > 0) ? 100000 : -100000;
      }

      const botCp = toBotPerspectiveCp(cp, game.turn());

      // We only update baseline or speak when we explicitly asked for eval
      if (awaitingEvalTag) {
        // store latest; we will finalize on bestmove (end of search)
        window.__lastEvalDuringSearch = botCp;
      }
      return;
    }

    if (typeof line === "string" && line.startsWith("bestmove ")) {
      const uci = line.split(" ")[1];

      // If this bestmove belongs to our eval-only search, it'll still output bestmove,
      // but we should NOT apply it unless we are in engineThinking mode.
      if (!engineThinking) {
        const newEval = (typeof window.__lastEvalDuringSearch === "number") ? window.__lastEvalDuringSearch : null;

        if (newEval !== null && lastBotEvalCp !== null) {
          const delta = newEval - lastBotEvalCp;
          speakDelta(delta);
        }

        if (newEval !== null) lastBotEvalCp = newEval;

        awaitingEvalTag = null;
        window.__lastEvalDuringSearch = undefined;
        return;
      }

      // Otherwise it's the engine's actual move calculation
      engineThinking = false;
      if (newGameBtn) newGameBtn.disabled = false;

      if (uci && uci !== "(none)") {
        const beforeCaptures = game.history({ verbose:true }).filter(m => m.captured).length;

        applyEngineMove(uci);

        const afterCaptures = game.history({ verbose:true }).filter(m => m.captured).length;
        if (afterCaptures > beforeCaptures) addBubble("ha!", "bot"); // capture taunt

        renderMoves();
        renderCaptured();

        // checks/mates/stalemate messaging after engine move
        speakGameState(engineColor);

        if (!game.game_over()) addBubble("Your move.", "bot");

        // refresh baseline eval after engine move (quietly)
        requestEval("postEngine");
      }
    }
  };

  sf.postMessage("uci");

  function requestEngineMove(){
    if (!engineReady || engineThinking) return;
    if (game.game_over()) return;
    if (game.turn() !== engineColor) return;

    engineThinking = true;
    if (newGameBtn) newGameBtn.disabled = true;

    sf.postMessage("position fen " + game.fen());
    sf.postMessage("go depth 14");
  }

  function applyEngineMove(uci){
    const from = uci.slice(0,2);
    const to   = uci.slice(2,4);
    const promo = uci.length >= 5 ? uci[4] : "q";
    const move = game.move({ from, to, promotion: promo });
    if (move) board.position(game.fen(), true);
  }

  const PIECE_THEME = "./img/chesspieces/wikipedia/{piece}.png";
  const pieceImgSrc = (pieceCode) => PIECE_THEME.replace("{piece}", pieceCode);

  // Legal move dots
  function clearMoveDots(){
    document.querySelectorAll("#board .lmDot").forEach(el => el.remove());
  }

  function showLegalMoveDots(square){
    clearMoveDots();
    const moves = game.moves({ square, verbose: true });
    for (const m of moves){
      const sqEl = document.querySelector(`#board .square-${m.to}`);
      if (!sqEl) continue;
      const dot = document.createElement("div");
      dot.className = "lmDot";
      sqEl.appendChild(dot);
    }
  }

  function renderMoves(){
    if (!movesEl) return;
    const history = game.history();
    const rows = [];
    for (let i = 0; i < history.length; i += 2){
      rows.push({ no: (i/2)+1, w: history[i]||"", b: history[i+1]||"" });
    }
    movesEl.innerHTML = "";
    rows.forEach((r, idx) => {
      const row = document.createElement("div");
      row.className = "moveRow";

      const no = document.createElement("div");
      no.className = "moveNo";
      no.textContent = r.no + ".";

      const w = document.createElement("div");
      w.className = "moveSan";
      w.textContent = r.w;

      const b = document.createElement("div");
      b.className = "moveSan";
      b.textContent = r.b;

      const isLastRow = idx === rows.length - 1;
      if (isLastRow) {
        if (history.length % 2 === 1) { if (r.w) w.classList.add("last"); }
        else { if (r.b) b.classList.add("last"); }
      }

      row.appendChild(no); row.appendChild(w); row.appendChild(b);
      movesEl.appendChild(row);
    });
    movesEl.scrollTop = movesEl.scrollHeight;
  }

  // Captured pieces: SWAPPED per your rule
  // White's captures show on black side (bottom strip)
  // Black's captures show on white side (top strip)
  function renderCaptured(){
    const verbose = game.history({ verbose:true });
    const capturedByWhite = [];
    const capturedByBlack = [];

    for (const mv of verbose){
      if (!mv.captured) continue;
      if (mv.color === "w") capturedByWhite.push(mv.captured);
      else capturedByBlack.push(mv.captured);
    }

    const order = { q:0, r:1, b:2, n:3, p:4 };
    capturedByWhite.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));
    capturedByBlack.sort((a,b)=> (order[a] ?? 9) - (order[b] ?? 9));

    const paint = (el, arr, prefixColor, emptyText) => {
      el.innerHTML = "";
      if (!arr.length) {
        const s = document.createElement("span");
        s.className = "empty";
        s.textContent = emptyText;
        el.appendChild(s);
        return;
      }
      for (const p of arr){
        const code = prefixColor + p.toUpperCase();
        const img = document.createElement("img");
        img.alt = code;
        img.src = pieceImgSrc(code);
        el.appendChild(img);
      }
    };

    paint(capturedTopEl, capturedByBlack, "w", "Captured: —");
    paint(capturedBottomEl, capturedByWhite, "b", "Lost: —");
  }

  function resetToMain(){
    game.reset();
    board.start(true);
    clearMoveDots();
    engineThinking = false;
    if (newGameBtn) newGameBtn.disabled = false;
    gameStarted = false;

    lastBotEvalCp = null;
    awaitingEvalTag = null;
    window.__lastEvalDuringSearch = undefined;

    renderMoves();
    renderCaptured();
    addBubble("New game ready.", "bot");
  }

  function startNewGame(asColor){
    playerColor = asColor;
    engineColor = (asColor === "w") ? "b" : "w";

    resetToMain();
    gameStarted = true;

    board.orientation(playerColor === "w" ? "white" : "black");
    addBubble("You are playing " + (playerColor === "w" ? "White." : "Black."), "bot");

    // Establish initial eval baseline
    setTimeout(() => requestEval("baseline"), 50);

    // If engine moves first
    if (engineReady && game.turn() === engineColor) requestEngineMove();
  }

  // Board init
  board = ChessBoard("board", {
    draggable: true,
    position: "start",
    pieceTheme: PIECE_THEME,

    onDragStart: (source, piece) => {
      if (!gameStarted) return false;
      if (game.game_over() || engineThinking) return false;

      const isWhitePiece = piece.startsWith("w");
      const isBlackPiece = piece.startsWith("b");

      if (playerColor === "w" && isBlackPiece) return false;
      if (playerColor === "b" && isWhitePiece) return false;
      if (game.turn() !== playerColor) return false;

      showLegalMoveDots(source);
      return true;
    },

    onDrop: (source, target) => {
      clearMoveDots();
      if (!gameStarted) return "snapback";

      const beforeCaptures = game.history({ verbose:true }).filter(m => m.captured).length;

      const move = game.move({ from: source, to: target, promotion: "q" });
      if (move === null) return "snapback";

      board.position(game.fen(), true);
      renderMoves();
      renderCaptured();

      addBubble("Played " + move.san, "you");

      const afterCaptures = game.history({ verbose:true }).filter(m => m.captured).length;
      if (afterCaptures > beforeCaptures) addBubble("oof", "bot");

      // checks/mates/stalemate messaging after PLAYER move
      speakGameState(playerColor);

      // After player's move, run a quick eval to decide the reaction lines
      // (then engine will think/move)
      requestEval("postPlayer");

      setTimeout(requestEngineMove, 60);
    },

    onSnapEnd: () => board.position(game.fen())
  });

  // Buttons (desktop)
  function openNewGame(){ openModal(sideModal); }
  function openResign(){ if (!gameStarted) return; openModal(resignModal); }

  if (newGameBtn) newGameBtn.addEventListener("click", openNewGame);
  if (flipBtn) flipBtn.addEventListener("click", () => board.flip());
  if (resignBtn) resignBtn.addEventListener("click", openResign);

  // Buttons (mobile sheet)
  mNewGameBtn.addEventListener("click", () => { closeSheet(); openNewGame(); });
  mFlipBtn.addEventListener("click", () => { closeSheet(); board.flip(); });
  mResignBtn.addEventListener("click", () => { closeSheet(); openResign(); });

  // Side modal actions
  playWhiteBtn.addEventListener("click", () => { closeModal(sideModal); startNewGame("w"); });
  playBlackBtn.addEventListener("click", () => { closeModal(sideModal); startNewGame("b"); });

  document.querySelectorAll("[data-close-side]").forEach(btn => btn.addEventListener("click", () => closeModal(sideModal)));
  document.querySelectorAll("[data-close-resign]").forEach(btn => btn.addEventListener("click", () => closeModal(resignModal)));

  // Resign modal actions
  resignNoBtn.addEventListener("click", () => closeModal(resignModal));
  resignYesBtn.addEventListener("click", () => {
    closeModal(resignModal);
    addBubble("You resigned.", "you");
    resetToMain();
  });

  // Click outside modal to close
  sideModal.addEventListener("click", (e) => { if (e.target === sideModal) closeModal(sideModal); });
  resignModal.addEventListener("click", (e) => { if (e.target === resignModal) closeModal(resignModal); });

  // Initial
  renderMoves();
  renderCaptured();
  addBubble("Press New Game to begin.", "bot");

  // Keep board sized correctly
  window.addEventListener("resize", () => board.resize());
  setTimeout(() => board.resize(), 250);
</script>
</body>
</html>
